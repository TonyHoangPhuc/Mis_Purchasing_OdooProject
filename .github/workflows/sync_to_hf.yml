name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_DEPLOY_ODOO: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://IceMisha:$HF_TOKEN@huggingface.co/spaces/IceMisha/OdooProject main
